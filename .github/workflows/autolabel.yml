name: "Autolabel PRs"

on:
  pull_request_target:
    types: [opened, reopened, synchronize]

jobs:
  call:
    uses: jellyfin/jellyfin-meta-plugins/.github/workflows/autolabel.yaml@c66b7d88b5febaa6dd685c13b60e5e2c1d3d01db # master
    with:
      repository-name: eddymoulton/jellyfin-plugin-oidc
    secrets:
      token: ${{ secrets.RELEASE_PAT }}
