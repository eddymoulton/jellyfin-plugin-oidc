name: "Publish Stable"

on:
  release:
    types: [released]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          dotnet-version: "9.0.x"

      - name: Build plugin
        id: jprm
        uses: oddstr13/jellyfin-plugin-repository-manager@9497a0a499416cc572ed2e07a391d9f943a37b4d # v1.1.1
        with:
          dotnet-target: net9.0

      - name: Generate checksums and upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
          ARTIFACT: ${{ steps.jprm.outputs.artifact }}
        run: |
          dir="$(dirname "$ARTIFACT")"
          name="$(basename "$ARTIFACT")"
          cd "$dir"
          md5sum "$name" > "$name.md5"
          sha256sum "$name" > "$name.sha256"
          gh release upload "$TAG" "$name" "$name.md5" "$name.sha256" --clobber

      - name: Checkout stable manifest
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: manifest-stable
          path: manifest-stable
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install jprm
        run: pipx install jprm

      - name: Update stable manifest
        env:
          TAG: ${{ github.event.release.tag_name }}
          ARTIFACT: ${{ steps.jprm.outputs.artifact }}
        run: |
          base="https://github.com/${{ github.repository }}/releases/download/${TAG}"
          jprm --verbosity=debug repo add \
            --url="$base" \
            --plugin-url="$base/$(basename "$ARTIFACT")" \
            manifest-stable/manifest.json \
            "$ARTIFACT"

      - name: Commit manifest
        run: |
          cd manifest-stable
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "chore: publish ${{ github.event.release.tag_name }} to stable manifest"
          git push
