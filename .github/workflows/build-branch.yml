name: "Branch Build"

on:
  push:
    branches-ignore: [main]
    paths-ignore: ["**/*.md"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: "9.0.x"

      - name: Derive artifact name
        id: meta
        run: |
          branch=$(echo "${GITHUB_REF_NAME}" | sed 's/[^a-zA-Z0-9.-]/_/g')
          echo "name=oidc-${branch}-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build plugin
        id: jprm
        uses: oddstr13/jellyfin-plugin-repository-manager@9497a0a499416cc572ed2e07a391d9f943a37b4d # v1.1.1
        with:
          dotnet-target: net9.0

      - name: Stage artifact under branch name
        run: cp "${{ steps.jprm.outputs.artifact }}" "${{ steps.meta.outputs.name }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ steps.meta.outputs.name }}
          path: ${{ steps.meta.outputs.name }}.zip
          if-no-files-found: error
          retention-days: 14
