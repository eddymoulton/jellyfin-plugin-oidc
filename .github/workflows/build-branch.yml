name: "Branch Build"

on:
  push:
    branches-ignore: [main]
    paths-ignore: ["**/*.md"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          dotnet-version: "9.0.x"

      - name: Derive artifact name
        id: meta
        run: |
          branch=$(echo "${GITHUB_REF_NAME}" | sed 's/[^a-zA-Z0-9.-]/_/g')
          echo "name=oidc-${branch}-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build plugin
        id: jprm
        uses: oddstr13/jellyfin-plugin-repository-manager@9497a0a499416cc572ed2e07a391d9f943a37b4d # v1.1.1
        with:
          dotnet-target: net9.0

      - name: Stage artifact under branch name
        run: cp "${{ steps.jprm.outputs.artifact }}" "${{ steps.meta.outputs.name }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ steps.meta.outputs.name }}
          path: ${{ steps.meta.outputs.name }}.zip
          if-no-files-found: error
          retention-days: 14
