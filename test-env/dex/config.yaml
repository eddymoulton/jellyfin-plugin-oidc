issuer: http://dex.localtest.me:5556/dex

storage:
  type: memory

web:
  http: 0.0.0.0:5556

oauth2:
  skipApprovalScreen: true

staticClients:
  - id: jellyfin-oid
    name: Jellyfin
    secret: dev-secret
    redirectURIs:
      - http://localhost:8096/sso/OID/redirect/dex
      - http://localhost:8096/sso/OID/redirect/dex-folderroles

enablePasswordDB: true

# Password for every user below is the literal string "password".
# Hash is bcrypt cost-10 of "password" — copy of the example hash from
# https://github.com/dexidp/dex/blob/v2.45.1/examples/config-dev.yaml
staticPasswords:
  - email: admin@test.local
    hash: "$2a$10$2b2cU8CPhOTaGrs1HRQuAueS7JTT5ZHsHSzYiFPm1leZck7Mc8T4W"
    username: admin
    name: Admin User
    emailVerified: true
    preferredUsername: admin
    userID: 00000000-0000-0000-0000-000000000001
    groups:
      - jellyfin-admin

  - email: user@test.local
    hash: "$2a$10$2b2cU8CPhOTaGrs1HRQuAueS7JTT5ZHsHSzYiFPm1leZck7Mc8T4W"
    username: user
    name: Regular User
    emailVerified: true
    preferredUsername: user
    userID: 00000000-0000-0000-0000-000000000002
    groups:
      - jellyfin-users

  - email: noaccess@test.local
    hash: "$2a$10$2b2cU8CPhOTaGrs1HRQuAueS7JTT5ZHsHSzYiFPm1leZck7Mc8T4W"
    username: noaccess
    name: No Access User
    emailVerified: true
    preferredUsername: noaccess
    userID: 00000000-0000-0000-0000-000000000003
    groups: []

  # Single-purpose accounts below are used only by their named test, so those tests don't need a
  # DB reset - the account's end state doesn't matter to anything else.

  # Admin role + no pre-existing Jellyfin account: promotion test.
  - email: promote@test.local
    hash: "$2a$10$2b2cU8CPhOTaGrs1HRQuAueS7JTT5ZHsHSzYiFPm1leZck7Mc8T4W"
    username: promote
    name: Promote User
    emailVerified: true
    preferredUsername: promote
    userID: 00000000-0000-0000-0000-000000000004
    groups:
      - jellyfin-admin

  # Non-admin role; the demote test makes it an admin out-of-band, then logs in to revoke it.
  - email: demote@test.local
    hash: "$2a$10$2b2cU8CPhOTaGrs1HRQuAueS7JTT5ZHsHSzYiFPm1leZck7Mc8T4W"
    username: demote
    name: Demote User
    emailVerified: true
    preferredUsername: demote
    userID: 00000000-0000-0000-0000-000000000005
    groups:
      - jellyfin-users

  # Folder-roles test: logs into the dex-folderroles provider, which maps jellyfin-users to folders.
  - email: folderuser@test.local
    hash: "$2a$10$2b2cU8CPhOTaGrs1HRQuAueS7JTT5ZHsHSzYiFPm1leZck7Mc8T4W"
    username: folderuser
    name: Folder Roles User
    emailVerified: true
    preferredUsername: folderuser
    userID: 00000000-0000-0000-0000-000000000006
    groups:
      - jellyfin-users
